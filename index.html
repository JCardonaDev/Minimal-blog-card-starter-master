<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimal Blog Card</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #FAFAF9;
      }

      .box {
        background: #fff;
        border-radius: 16px;
        width: 336px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        font-family: Arial, sans-serif;
      }

      .image {
        width: 100%;
        height: 152px;
        overflow: hidden;
      }

      .image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        padding: 16px;
        border-radius: 24px;
      }

      .content {
        padding: 16px;
      }

      .tag {
        background: #e6f0ff;
        color: #4f46e5;
        display: inline-block;
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        margin-bottom: 6px;
      }

      h1 {
        font-size: 18px;
        font-weight: 700;
        color: #111;
        margin-bottom: 6px;
      }

      .desc {
        font-size: 14px;
        color: #888;
        margin-bottom: 20px;
        line-height: 1.5;
      }

      .author {
        font-size: 13px;
        color: #555;
      }

      .author-info {
        font-size: 14px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
        position: absolute;
        bottom: 16px;
      }

      .author-info a {
        text-decoration: none;
        color: inherit;
      }

      .line{
        border: #E5EAF0 1px solid;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>

    <div class="box">
      <div class="image">
        <img src="Cactus.jpg" alt="un cactus en una matera con un fondo rosa">
      </div>
      <div class="content">
        <span class="tag">Design</span>
        <h1>Embracing Minimalism</h1>
        <p class="desc">
          From minimalist sculptures to minimalist paintings, this blog will
          inspire you to appreciate the beauty that lies in simplicity
          <div class="line"></div>
        </p>
        <p class="author">Annie Spratt</p>
      </div>
    </div>

    <div class="author-info">
      Coded by <a href="#">Jonathan</a> | Challenge by
      <a href="https://www.devchallenges.io" target="_blank">devChallenges.io</a>
    </div>

  </body>
</html>
